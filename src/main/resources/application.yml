server:
  port: 8080
spring:
  application:
    name: konblog-server
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/kon_blog?characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 183808
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB
  data:
    redis:
      host: localhost
      port: 6379
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.konblog.module.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
sa-token:
  token-name: satoken
  timeout: 7200
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
knife4j:
  enable: true
  setting:
    language: zh_cn
# MinIO OSS
upload:
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: konblog